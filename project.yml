name: FocusFlow
options:
  bundleIdPrefix: com.and
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.1
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: 1.1.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.3
targets:
  FocusFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FocusFlow
    info:
      path: FocusFlow/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "FocusFlow uses accessibility APIs to determine active window titles and browser tab names to calculate focus scores."
    dependencies:
      - package: GRDB
        product: GRDB
      - package: LaunchAtLogin
        product: LaunchAtLogin
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Automatic
  FocusFlowTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FocusFlowTests
    dependencies:
      - target: FocusFlow
    settings:
      base:
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
