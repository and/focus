name: FocusFlow
options:
  bundleIdPrefix: com.and
targets:
  FocusFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FocusFlow
    info:
      path: FocusFlow/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "FocusFlow uses accessibility APIs to determine active window titles and browser tab names to calculate focus scores."
    settings:
      base:
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Automatic
